version: 0.2

env:
  variables:
    CF_HOME: "/opt/coldfusion2025"
    CF_WEBROOT: "/opt/coldfusion2025/cfusion/wwwroot"
    CF_BIN: "/opt/coldfusion2025/cfusion/bin"
    CODEDEPLOY_STAGING: "/opt/codedeploy/cf-app"
    COLDBOX_APP_DIR: "."
    DEPLOY_BUNDLE_DIR: "codedeploy-bundle"

phases:
  install:
    commands:
      - echo "=== Install phase ==="
      - printf '%s\n' '[CommandBox]' 'name=CommandBox' 'baseurl=https://downloads.ortussolutions.com/RPMS/noarch' 'enabled=1' 'gpgcheck=0' | sudo tee /etc/yum.repos.d/commandbox.repo >/dev/null
      - sudo dnf install -y commandbox rsync
      - box version

  pre_build:
    commands:
      - echo "=== Pre-build ==="
      - test -f appspec.yml
      - test -f scripts/before-install.sh
      - test -f scripts/deploy-release.sh
      - test -f scripts/restart-coldfusion.sh
      - box install --production

  build:
    commands:
      - echo "=== Build ==="
      - rm -rf "${DEPLOY_BUNDLE_DIR}"
      - mkdir -p "${DEPLOY_BUNDLE_DIR}/scripts"
      - |
        rsync -a \
          --exclude '.git/' \
          --exclude '.gitignore' \
          --exclude '.gitattributes' \
          --exclude 'tests/' \
          --exclude 'lib/testbox/' \
          --exclude 'lib/modules/route-visualizer/' \
          --exclude '.engine/' \
          --exclude '.env' \
          --exclude '.env.example' \
          --exclude 'runtime/logs/' \
          --exclude 'app/logs/' \
          --exclude 'build/' \
          --exclude 'build/.db/' \
          --exclude '.tmp/' \
          --exclude '.devcontainer/' \
          --exclude 'docker/' \
          --exclude 'public/includes/build/' \
          --exclude '.vscode/' \
          --exclude "${DEPLOY_BUNDLE_DIR}/" \
          --exclude 'appspec.yml' \
          --exclude 'scripts/' \
          ./ "${DEPLOY_BUNDLE_DIR}/"
      - cp appspec.yml "${DEPLOY_BUNDLE_DIR}/appspec.yml"
      - cp index.cfm "${DEPLOY_BUNDLE_DIR}/index.cfm"
      - cp scripts/before-install.sh "${DEPLOY_BUNDLE_DIR}/scripts/before-install.sh"
      - cp scripts/deploy-release.sh "${DEPLOY_BUNDLE_DIR}/scripts/deploy-release.sh"
      - cp scripts/restart-coldfusion.sh "${DEPLOY_BUNDLE_DIR}/scripts/restart-coldfusion.sh"
      - chmod +x "${DEPLOY_BUNDLE_DIR}/scripts/before-install.sh"
      - chmod +x "${DEPLOY_BUNDLE_DIR}/scripts/deploy-release.sh"
      - chmod +x "${DEPLOY_BUNDLE_DIR}/scripts/restart-coldfusion.sh"
      - test -f "${DEPLOY_BUNDLE_DIR}/appspec.yml"
      - test -f "${DEPLOY_BUNDLE_DIR}/index.cfm"
      - test -f "${DEPLOY_BUNDLE_DIR}/scripts/before-install.sh"
      - test -f "${DEPLOY_BUNDLE_DIR}/scripts/deploy-release.sh"
      - test -f "${DEPLOY_BUNDLE_DIR}/scripts/restart-coldfusion.sh"


  post_build:
    commands:
      - echo "=== Post-build — artifact ready ==="

artifacts:
  base-directory: codedeploy-bundle
  files:
    - '**/*'
